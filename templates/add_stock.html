{% extends "base.html" %}
{% block content %}
<style>
    .horizontal-form {
        display: flex;
        gap: 10px;
        align-items: flex-end;
        background: #f4f4f4;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 30px;
        overflow-x: auto;
    }
    .horizontal-form div { display: flex; flex-direction: column; flex-shrink: 0; }
    .horizontal-form label { font-size: 0.8rem; margin-bottom: 2px; color: #666; }
    .horizontal-form input { margin-bottom: 0; padding: 5px; width: 150px; }
    h3 { margin-top: 30px; border-bottom: 1px solid #ddd; }
</style>

<h1>Inventory & Asset Entry</h1>

<h3>Add Laptop Stock</h3>
<form action="/add-stock" method="post" class="horizontal-form">
    <div><label>Model</label><input type="text" name="model" required></div>
    <div><label>Serial #</label><input type="text" name="serial"></div>
    <div><label>Supplier</label><input type="text" name="supplier"></div>
    <div><label>Price (INR)</label><input type="number" step="0.01" name="price" required></div>
    <button type="submit">Add Row</button>
</form>

<h3>Add Repair Tool (Asset)</h3>
<form action="/add-asset" method="post" class="horizontal-form">
    <div><label>Tool Name</label><input type="text" name="name" required></div>
    <div><label>Cost</label><input type="number" step="0.01" name="cost" required></div>
    <div><label>Purchase Date</label><input type="date" name="p_date" required></div>
    <button type="submit" style="background-color: #555;">Save Asset</button>
</form>

<p><a href="/">← Back to Dashboard</a></p>
{% endblock %}
