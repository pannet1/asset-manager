{% extends "base.html" %}
{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center;">
    <h2>Workshop Assets & Tools</h2>
    <div style="background: #333; color: white; padding: 10px 20px; border-radius: 5px;">
        Total Investment: ₹{{ total_value }}
    </div>
</div>

<section style="background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 30px;">
    <h4>Register New Equipment</h4>
    <form action="/add-asset" method="post" style="display: flex; gap: 15px; align-items: flex-end;">
        <div style="flex: 2;">
            <label>Tool/Asset Name</label><br>
            <input type="text" name="name" style="width: 100%;" placeholder="e.g. Soldering Station" required>
        </div>
        <div style="flex: 1;">
            <label>Cost (₹)</label><br>
            <input type="number" step="0.01" name="cost" style="width: 100%;" required>
        </div>
        <div style="flex: 1;">
            <label>Purchase Date</label><br>
            <input type="date" name="p_date" style="width: 100%;" required>
        </div>
        <button type="submit" style="background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;">
            Add Asset
        </button>
    </form>
</section>

<table style="width: 100%; border-collapse: collapse;">
    <thead>
        <tr style="background: #eee; text-align: left;">
            <th style="padding: 12px; border: 1px solid #ddd;">Date</th>
            <th style="padding: 12px; border: 1px solid #ddd;">Tool Name</th>
            <th style="padding: 12px; border: 1px solid #ddd;">Cost</th>
        </tr>
    </thead>
    <tbody>
        {% for asset in assets %}
        <tr>
            <td style="padding: 12px; border: 1px solid #ddd;">{{ asset.purchase_date }}</td>
            <td style="padding: 12px; border: 1px solid #ddd;">{{ asset.name }}</td>
            <td style="padding: 12px; border: 1px solid #ddd;">₹{{ asset.cost }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
