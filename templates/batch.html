{% extends "base.html" %}
{% block content %}
<style>
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th, td { border-bottom: 1px solid #e1e1e1; padding: 10px; text-align: left; }
    .table-input {
        width: 100%;
        background: transparent;
        border: none;
        outline: none;
        padding: 0;
        margin: 0;
        font-family: inherit;
        font-size: inherit;
        color: #333;
    }
    .table-input:focus { background: #fff8e1; }
    .btn-create { padding: 4px 12px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background: #eee; }
</style>

<h2>📦 Batch Management</h2>

<table>
    <thead>
        <tr>
            <th style="width: 10%;">ID</th>
            <th style="width: 25%;">Supplier</th>
            <th style="width: 35%;">Description</th>
            <th style="width: 15%;">Date</th>
            <th style="width: 15%;">Action</th>
        </tr>
    </thead>
    <tbody>
        <tr style="background: #fafafa;">
            <form action="/create-batch" method="post">
                <td><small>(Auto)</small></td>
                <td><input type="text" name="supplier" class="table-input" placeholder="Enter Supplier..." required></td>
                <td><input type="text" name="desc" class="table-input" placeholder="Enter Description..." required></td>
                <td><input type="date" name="date_str" class="table-input" value="{{ current_date }}" required></td>
                <td><button type="submit" class="btn-create">Create</button></td>
            </form>
        </tr>

        {% for b in batches %}
        <tr>
            <td><strong>{{ b.id }}</strong></td>
            <td>{{ b.supplier_name }}</td>
            <td>{{ b.description }}</td>
            <td>{{ b.date }}</td>
            <td><a href="/add-items/{{ b.id }}">Add items</a></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
