{% extends "base.html" %}
{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
    <h2>Workshop Assets & Tools</h2>
    <div class="btn btn-primary">Total Investment: ₹{{ total_value }}</div>
</div>

<div class="card card-green" style="margin-bottom: 30px;">
    <h4 style="margin-top: 0;">Register New Equipment</h4>
    <form action="/add-asset" method="post" style="display: flex; gap: 15px; align-items: flex-end;">
        <div style="flex: 2;">
            <label>Tool Name</label>
            <input type="text" name="name" class="table-input" style="border-bottom: 1px solid #ccc;" placeholder="e.g. Oscilloscope" required>
        </div>
        <div style="flex: 1;">
            <label>Cost (₹)</label>
            <input type="number" step="0.01" name="cost" class="table-input" style="border-bottom: 1px solid #ccc;" required>
        </div>
        <div style="flex: 1;">
            <label>Date</label>
            <input type="date" name="p_date" class="table-input" style="border-bottom: 1px solid #ccc;" required>
        </div>
        <button type="submit" class="btn btn-primary">Add Asset</button>
    </form>
</div>

<table class="data-table">
    <thead>
        <tr>
            <th>Date</th>
            <th>Tool Name</th>
            <th>Cost</th>
        </tr>
    </thead>
    <tbody>
        {% for asset in assets %}
        <tr>
            <td>{{ asset.purchase_date }}</td>
            <td>{{ asset.name }}</td>
            <td>₹{{ asset.cost }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
